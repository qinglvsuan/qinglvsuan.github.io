<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Subway Surfer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0f172a; font-family: 'Segoe UI', sans-serif; user-select: none; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        #score-board { 
            position: absolute; top: 20px; left: 20px;
            font-size: 40px; font-weight: 900; color: white; 
            text-shadow: 0 0 10px #ec4899, 2px 2px 0px #000; font-style: italic;
        }
        
        #controls-hint {
            position: absolute; bottom: 20px; right: 20px;
            text-align: right; color: rgba(255,255,255,0.5); font-size: 14px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px;
            text-shadow: 1px 1px 2px black;
        }

        #game-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: auto; z-index: 20; transition: opacity 0.3s;
        }
        
        h1 { 
            color: #22d3ee; margin: 0 0 10px 0; font-size: 60px; text-transform: uppercase; 
            text-shadow: 0 0 20px #22d3ee; font-style: italic; letter-spacing: -2px;
        }
        
        p { color: white; font-size: 24px; margin-bottom: 40px; }
        
        .btn {
            background: linear-gradient(45deg, #ec4899, #8b5cf6); border: none; padding: 15px 40px;
            color: white; font-size: 20px; font-weight: bold; border-radius: 50px; cursor: pointer;
            transition: all 0.2s; box-shadow: 0 0 20px rgba(236, 72, 153, 0.4); text-transform: uppercase;
        }
        .btn:hover { transform: scale(1.1); filter: brightness(1.2); }
        
        .speed-line {
            position: absolute; background: rgba(255,255,255,0.05); width: 2px; height: 100px;
            animation: rain 0.5s linear infinite; z-index: -1;
        }
        @keyframes rain { from { transform: translateY(-100vh); } to { transform: translateY(100vh); } }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="score-board">0</div>
        <div id="controls-hint">
            A / D : Move<br>
            SPACE : Jump<br>
            S / ↓ : Slide
        </div>
    </div>

    <div id="game-overlay">
        <h1 id="title-text">NEON RUN</h1>
        <p id="status-text">Use [S] to Slide under the huge blocks!</p>
        <button class="btn" id="action-btn">START GAME</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        // --- 核心参数 ---
        const CONFIG = {
            initSpeed: 0.15,     
            maxSpeed: 0.8,
            speedInc: 0.0001,
            laneWidth: 2.2,
            // 滞空物理
            jumpForce: 0.18,     
            gravity: 0.008,      
            slideTime: 800      
        };

        // --- 1. 场景 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a);
        scene.fog = new THREE.FogExp2(0x0f172a, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 8);
        camera.lookAt(0, 0.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 灯光
        scene.add(new THREE.AmbientLight(0xffffff, 0.5)); 
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 点光源增加氛围
        const pointLight = new THREE.PointLight(0xec4899, 2, 20);
        pointLight.position.set(0, 2, 0);
        scene.add(pointLight);

        // --- 2. 材质 ---
        function createGridTexture() {
            const c = document.createElement('canvas'); c.width=512; c.height=512;
            const ctx = c.getContext('2d');
            ctx.fillStyle='#0f172a'; ctx.fillRect(0,0,512,512);
            
            // 绘制发光线条
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ec4899';
            ctx.strokeStyle='#ec4899'; ctx.lineWidth=6; ctx.strokeRect(0,0,512,512);
            
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#22d3ee';
            ctx.strokeStyle='#22d3ee'; ctx.lineWidth=2;
            for(let i=64; i<512; i+=64){ctx.moveTo(i,0);ctx.lineTo(i,512);ctx.moveTo(0,i);ctx.lineTo(512,i);}
            ctx.stroke();
            const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping;
            return t;
        }
        
        function createHazardTexture() {
            const c=document.createElement('canvas'); c.width=128; c.height=128;
            const ctx=c.getContext('2d');
            ctx.fillStyle='#1e293b'; ctx.fillRect(0,0,128,128);
            
            ctx.strokeStyle='#f43f5e'; ctx.lineWidth=8;
            ctx.strokeRect(4,4,120,120);
            
            ctx.fillStyle='#f43f5e';
            ctx.font = "bold 40px Arial";
            ctx.fillText("DANGER", 10, 75);
            
            return new THREE.CanvasTexture(c);
        }

        // --- 3. 对象 ---
        const floorTex = createGridTexture(); 
        floorTex.repeat.set(10, 40); 
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(40, 800), new THREE.MeshPhongMaterial({ map: floorTex }));
        ground.rotation.x = -Math.PI/2; 
        ground.position.z = -350; 
        ground.receiveShadow = true;
        scene.add(ground);

        // 玩家模型优化
        const playerGroup = new THREE.Group();
        const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshPhongMaterial({ color: 0x22d3ee, emissive: 0x22d3ee, emissiveIntensity: 0.5 }));
        bodyMesh.castShadow = true;
        playerGroup.add(bodyMesh);
        
        const eyeMat = new THREE.MeshBasicMaterial({color: 0xffffff});
        const eye1 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.1), eyeMat); eye1.position.set(-0.2, 0.2, -0.4); playerGroup.add(eye1);
        const eye2 = eye1.clone(); eye2.position.set(0.2, 0.2, -0.4); playerGroup.add(eye2);
        
        playerGroup.position.y = 0.4;
        scene.add(playerGroup);

        // 变量
        let lanes = [-CONFIG.laneWidth, 0, CONFIG.laneWidth];
        let currentLane = 1; 
        let playerSpeedZ = CONFIG.initSpeed;
        let score = 0;
        let isRunning = false;
        let isGameOver = false;
        
        // 动作
        let isJumping = false;
        let isSliding = false;
        let slideTimer = null;
        let verticalVelocity = 0;
        
        // 障碍物
        const obstacleMat = new THREE.MeshPhongMaterial({ map: createHazardTexture(), emissive: 0xf43f5e, emissiveIntensity: 0.2 });
        let obstacles = [];

        function spawnObstacle() {
            if (!isRunning || isGameOver) return;

            let spawnChance = 0.4 + (playerSpeedZ * 0.5); 
            const count = Math.random() > spawnChance ? 1 : 2;
            let availableLanes = [0, 1, 2].sort(() => Math.random() - 0.5);
            let spawnLanes = availableLanes.slice(0, count);

            spawnLanes.forEach(laneIdx => {
                const typeRnd = Math.random();
                const obsGroup = new THREE.Group();
                let hitBoxSize = new THREE.Vector3(1.6, 0.8, 0.5);
                let hitBoxY = 0.4;

                if (typeRnd < 0.4) {
                    // [矮墙 Low]
                    const mesh = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.8, 0.8), obstacleMat);
                    mesh.position.y = 0.4; mesh.castShadow = true;
                    obsGroup.add(mesh);
                    hitBoxY = 0.4;
                    hitBoxSize.set(1.8, 0.8, 0.8);
                } else if (typeRnd < 0.7) {
                    // [高墙 Tall] - 需要跳跃
                    const mesh = new THREE.Mesh(new THREE.BoxGeometry(1.8, 2.5, 0.8), obstacleMat);
                    mesh.position.y = 1.25; mesh.castShadow = true;
                    obsGroup.add(mesh);
                    hitBoxSize.set(1.8, 2.5, 0.8); hitBoxY = 1.25;
                } else {
                    // [悬浮障碍 Flying] - 需要下滑
                    const mesh = new THREE.Mesh(new THREE.BoxGeometry(2.0, 3.0, 0.8), obstacleMat);
                    mesh.position.y = 3.0; // 底部离地 1.5
                    mesh.castShadow = true;
                    obsGroup.add(mesh);
                    
                    hitBoxSize.set(2.0, 3.0, 0.8);
                    hitBoxY = 3.0;
                }

                obsGroup.position.set(lanes[laneIdx], 0, playerGroup.position.z - 120 - Math.random()*30);
                obsGroup.userData = { 
                    box: new THREE.Box3(), 
                    size: hitBoxSize, 
                    yOffset: hitBoxY 
                };
                scene.add(obsGroup);
                obstacles.push(obsGroup);
            });

            const nextSpawn = Math.max(500, 2000 / (playerSpeedZ * 15));
            setTimeout(spawnObstacle, nextSpawn);
        }

        // --- 4. 控制 ---
        function switchLane(dir) {
            if (dir === 'left' && currentLane > 0) currentLane--;
            if (dir === 'right' && currentLane < 2) currentLane++;
        }

        function jump() {
            if (!isJumping && !isSliding) {
                isJumping = true;
                verticalVelocity = CONFIG.jumpForce;
            }
        }

        function slide() {
            if (!isSliding && !isJumping) {
                isSliding = true;
                bodyMesh.material.color.setHex(0xfacc15);
                if(slideTimer) clearTimeout(slideTimer);
                slideTimer = setTimeout(() => {
                    isSliding = false;
                    bodyMesh.material.color.setHex(0x22d3ee);
                }, CONFIG.slideTime);
            } else if (isJumping) {
                verticalVelocity = -CONFIG.jumpForce * 1.5; 
            }
        }

        document.addEventListener('keydown', (e) => {
            if (isGameOver && e.code === 'Space') {
                startGame();
                return;
            }
            if (!isRunning) return;
            switch(e.key) {
                case 'a': case 'ArrowLeft': switchLane('left'); break;
                case 'd': case 'ArrowRight': switchLane('right'); break;
                case 'w': case 'ArrowUp': case ' ': jump(); break;
                case 's': case 'ArrowDown': slide(); break;
            }
        });

        // 简单的触摸支持
        let touchStartX = 0;
        let touchStartY = 0;
        document.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        document.addEventListener('touchend', e => {
            if (!isRunning) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30) switchLane('right');
                else if (dx < -30) switchLane('left');
            } else {
                if (dy < -30) jump();
                else if (dy > 30) slide();
            }
        });

        // --- 5. 循环 ---
        const playerBox = new THREE.Box3();
        
        // 速度线动画
        const speedLines = [];
        for(let i=0; i<30; i++) {
            const d = document.createElement('div');
            d.className = 'speed-line';
            d.style.left = Math.random()*100+'%';
            d.style.animationDuration = (Math.random()*0.4+0.2)+'s';
            d.style.opacity = Math.random() * 0.3;
            document.body.appendChild(d);
            speedLines.push(d);
        }

        function update() {
            requestAnimationFrame(update);
            if (!isRunning || isGameOver) return;

            if(playerSpeedZ < CONFIG.maxSpeed) playerSpeedZ += CONFIG.speedInc;
            playerGroup.position.z -= playerSpeedZ;
            
            // 相机平滑跟随
            camera.position.z = playerGroup.position.z + 8;
            camera.position.x += (playerGroup.position.x - camera.position.x) * 0.05; 
            ground.position.z = playerGroup.position.z - 350;
            
            // 纹理滚动
            floorTex.offset.y += playerSpeedZ * 0.05;
            pointLight.position.z = playerGroup.position.z;

            const targetX = lanes[currentLane];
            playerGroup.position.x += (targetX - playerGroup.position.x) * 0.2;
            playerGroup.rotation.z = (playerGroup.position.x - targetX) * -0.2;

            // 跳跃
            if (isJumping) {
                playerGroup.position.y += verticalVelocity;
                verticalVelocity -= CONFIG.gravity;
                if (playerGroup.position.y <= 0.4) {
                    playerGroup.position.y = 0.4;
                    isJumping = false;
                    verticalVelocity = 0;
                    playerGroup.rotation.x = 0;
                } else {
                    playerGroup.rotation.x -= 0.15; // 空中翻滚
                }
            } else {
                playerGroup.position.y = 0.4;
                playerGroup.rotation.x = 0;
            }

            // 下滑
            if (isSliding) {
                playerGroup.scale.set(1.3, 0.4, 1.3); 
                if(!isJumping) playerGroup.position.y = 0.2; 
            } else {
                playerGroup.scale.set(1, 1, 1);
            }

            playerBox.setFromObject(playerGroup);
            playerBox.expandByScalar(-0.2); // 缩小碰撞体积，提高容错

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let grp = obstacles[i];
                // 移除过后的障碍物
                if (grp.position.z > playerGroup.position.z + 10) {
                    scene.remove(grp);
                    obstacles.splice(i, 1);
                    score += 10;
                    document.getElementById('score-board').innerText = score;
                    continue;
                }

                // 动态更新碰撞盒
                const center = new THREE.Vector3(grp.position.x, grp.userData.yOffset, grp.position.z);
                grp.userData.box.setFromCenterAndSize(center, grp.userData.size);

                if (playerBox.intersectsBox(grp.userData.box)) {
                    gameOver();
                    return;
                }
            }

            renderer.render(scene, camera);
        }

        function startGame() {
            obstacles.forEach(o => scene.remove(o));
            obstacles = [];
            score = 0;
            playerSpeedZ = CONFIG.initSpeed;
            currentLane = 1;
            playerGroup.position.set(0, 0.4, 0);
            playerGroup.rotation.set(0, 0, 0);
            playerGroup.scale.set(1, 1, 1);
            bodyMesh.material.color.setHex(0x22d3ee);
            document.getElementById('score-board').innerText = 0;
            
            isRunning = true;
            isGameOver = false;
            
            document.getElementById('game-overlay').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('game-overlay').style.display = 'none';
                spawnObstacle();
            }, 300);
        }

        function gameOver() {
            isGameOver = true;
            isRunning = false;
            document.getElementById('title-text').innerText = "CRASHED!";
            document.getElementById('status-text').innerText = "Final Score: " + score;
            document.getElementById('action-btn').innerText = "TRY AGAIN";
            document.getElementById('game-overlay').style.display = 'flex';
            setTimeout(() => document.getElementById('game-overlay').style.opacity = 1, 50);
        }

        document.getElementById('action-btn').addEventListener('click', startGame);
        update();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
