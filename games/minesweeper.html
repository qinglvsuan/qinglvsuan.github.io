<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minesweeper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; display: flex; flex-col; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .cell { width: 30px; height: 30px; background: #334155; border: 1px solid #475569; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; user-select: none; }
        .cell:hover { background: #475569; }
        .cell.revealed { background: #1e293b; border-color: #1e293b; }
        .cell.bomb { background: #ef4444; }
        .cell.flagged { color: #f59e0b; }
    </style>
</head>
<body class="flex flex-col">
    <h2 class="text-2xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500">MINESWEEPER</h2>
    <div class="mb-4 text-slate-400 text-sm">Left Click: Reveal | Right Click: Flag</div>
    <div id="grid" class="grid grid-cols-10 gap-1 bg-slate-800 p-2 rounded-lg shadow-2xl"></div>
    <button onclick="init()" class="mt-6 px-6 py-2 bg-pink-600 hover:bg-pink-500 rounded-full text-white transition">Reset</button>

    <script>
        const gridEl = document.getElementById('grid');
        const size = 10;
        const bombCount = 15;
        let cells = [];
        let gameOver = false;

        function init() {
            gridEl.innerHTML = '';
            cells = [];
            gameOver = false;
            
            // 生成格子
            for(let i=0; i<size*size; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.id = i;
                cell.addEventListener('click', () => handleClick(cell));
                cell.addEventListener('contextmenu', (e) => { e.preventDefault(); handleRightClick(cell); });
                gridEl.appendChild(cell);
                cells.push({ element: cell, isBomb: false, revealed: false, flagged: false, neighborBombs: 0 });
            }

            // 埋雷
            let bombsPlaced = 0;
            while(bombsPlaced < bombCount) {
                let idx = Math.floor(Math.random() * cells.length);
                if(!cells[idx].isBomb) {
                    cells[idx].isBomb = true;
                    bombsPlaced++;
                }
            }

            // 计算数字
            for(let i=0; i<cells.length; i++) {
                if(!cells[i].isBomb) {
                    let count = 0;
                    getNeighbors(i).forEach(n => { if(cells[n].isBomb) count++; });
                    cells[i].neighborBombs = count;
                }
            }
        }

        function getNeighbors(idx) {
            const neighbors = [];
            const r = Math.floor(idx/size);
            const c = idx % size;
            for(let i=-1; i<=1; i++) {
                for(let j=-1; j<=1; j++) {
                    if(i===0 && j===0) continue;
                    const nr = r+i; const nc = c+j;
                    if(nr>=0 && nr<size && nc>=0 && nc<size) neighbors.push(nr*size + nc);
                }
            }
            return neighbors;
        }

        function handleClick(el) {
            if(gameOver) return;
            const id = parseInt(el.dataset.id);
            const cell = cells[id];
            if(cell.flagged || cell.revealed) return;

            if(cell.isBomb) {
                el.classList.add('bomb');
                el.innerHTML = '💣';
                gameOver = true;
                alert('BOOM! Game Over.');
                revealAll();
            } else {
                reveal(id);
            }
        }

        function handleRightClick(el) {
            if(gameOver) return;
            const id = parseInt(el.dataset.id);
            const cell = cells[id];
            if(cell.revealed) return;
            cell.flagged = !cell.flagged;
            el.classList.toggle('flagged');
            el.innerHTML = cell.flagged ? '🚩' : '';
        }

        function reveal(id) {
            const cell = cells[id];
            if(cell.revealed || cell.flagged) return;
            cell.revealed = true;
            cell.element.classList.add('revealed');
            
            if(cell.neighborBombs > 0) {
                cell.element.innerHTML = cell.neighborBombs;
                // 颜色代码
                const colors = ['#22d3ee', '#a3e635', '#fbbf24', '#f87171'];
                cell.element.style.color = colors[Math.min(cell.neighborBombs-1, 3)];
            } else {
                // 递归打开空白区域
                getNeighbors(id).forEach(n => reveal(n));
            }
        }

        function revealAll() {
            cells.forEach(c => {
                if(c.isBomb) {
                    c.element.classList.add('bomb');
                    c.element.innerHTML = '💣';
                }
            });
        }

        init();
    </script>
</body>
</html>
