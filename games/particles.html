<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Particles Flow</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: radial-gradient(circle at center, #0f172a 0%, #000000 100%); 
        }
        canvas { display: block; }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-family: 'Courier New', monospace;
            font-size: 12px;
            pointer-events: none;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="ui">MOVE MOUSE TO INTERACT · SCROLL TO ZOOM</div>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.0005);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 3000);
        camera.position.z = 800;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // 粒子系统创建
        const particlesGeometry = new THREE.BufferGeometry();
        const count = 5000;
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);
        const sizes = new Float32Array(count);

        const colorPalette = [
            new THREE.Color(0x38bdf8), // Cyan
            new THREE.Color(0xc084fc), // Purple
            new THREE.Color(0xf472b6)  // Pink
        ];

        for(let i = 0; i < count; i++) {
            // 环形分布
            const radius = 200 + Math.random() * 800;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta);
            const z = radius * Math.cos(phi);

            positions[i*3] = x;
            positions[i*3+1] = y;
            positions[i*3+2] = z;

            const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
            colors[i*3] = color.r;
            colors[i*3+1] = color.g;
            colors[i*3+2] = color.b;

            sizes[i] = Math.random() * 4;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        particlesGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        // 自定义着色器材质
        const vertexShader = `
            attribute float size;
            varying vec3 vColor;
            void main() {
                vColor = color;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * (1000.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            varying vec3 vColor;
            void main() {
                // 圆形粒子 + 柔和发光边缘
                vec2 xy = gl_PointCoord.xy - vec2(0.5);
                float ll = length(xy);
                if(ll > 0.5) discard;
                float alpha = (0.5 - ll) * 2.0;
                gl_FragColor = vec4(vColor, alpha);
            }
        `;

        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthTest: false,
            transparent: true
        });

        const particles = new THREE.Points(particlesGeometry, material);
        scene.add(particles);

        // 交互逻辑
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;
        
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX) * 2;
            mouseY = (event.clientY - windowHalfY) * 2;
        });
        
        // 触屏支持
        document.addEventListener('touchmove', (event) => {
            if(event.touches.length > 0) {
                mouseX = (event.touches[0].clientX - windowHalfX) * 2;
                mouseY = (event.touches[0].clientY - windowHalfY) * 2;
            }
        });

        document.addEventListener('wheel', (event) => {
            camera.position.z += event.deltaY * 0.5;
            camera.position.z = Math.max(200, Math.min(camera.position.z, 2000));
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime() * 0.05;

            // 相机缓动跟随
            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;
            
            particles.rotation.x += 0.001 + targetY * 0.05;
            particles.rotation.y += 0.002 + targetX * 0.05;
            
            // 动态起伏
            const positions = particles.geometry.attributes.position.array;
            for(let i=0; i<count; i++) {
                const i3 = i*3;
                // 让粒子产生轻微的呼吸律动
                const offset = Math.sin(time + positions[i3]) * 0.5;
                positions[i3+1] += offset; 
            }
            particles.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
