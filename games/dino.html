<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Dino Run</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0f172a; color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { background: #1e293b; border: 2px solid #22d3ee; border-radius: 10px; box-shadow: 0 0 20px rgba(34, 211, 238, 0.3); }
    </style>
</head>
<body>
    <h1 class="text-3xl font-bold text-cyan-400 mb-4 tracking-widest">NEON DINO</h1>
    <canvas id="gameCanvas" width="800" height="300"></canvas>
    <p class="mt-4 text-slate-400">SPACE / UP to Jump | DOWN to Duck</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameSpeed = 6;
        let score = 0;
        let highScore = localStorage.getItem('dino-high-score') || 0;
        let frame = 0;
        let isGameOver = false;
        let isPlaying = false;

        // Dino
        const dino = {
            x: 80, y: 200, width: 44, height: 54, dy: 0, jumpPower: 13, gravity: 0.7, grounded: false, isDucking: false,
            draw() {
                ctx.save();
                // Glow effect
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ec4899';
                ctx.fillStyle = '#ec4899'; 
                
                if(this.isDucking) {
                    // Ducker shape
                    ctx.beginPath();
                    ctx.roundRect(this.x, this.y + 24, 65, 30, 8);
                    ctx.fill();
                    // Eye
                    ctx.fillStyle = 'white';
                    ctx.fillRect(this.x + 45, this.y + 32, 6, 6);
                } else {
                    // Normal shape
                    ctx.beginPath();
                    ctx.roundRect(this.x, this.y, this.width, this.height, 10);
                    ctx.fill();
                    // Leg animation simple
                    if(isPlaying && !this.isJumping) {
                        ctx.fillStyle = '#ec4899';
                        const legH = (Math.sin(frame * 0.2) > 0) ? 10 : 5;
                        ctx.fillRect(this.x + 5, this.y + this.height, 10, legH);
                        ctx.fillRect(this.x + 25, this.y + this.height, 10, 15 - legH);
                    }
                    // Eye
                    ctx.fillStyle = 'white';
                    ctx.fillRect(this.x + 30, this.y + 12, 6, 6);
                }
                ctx.restore();
            },
            jump() {
                if (this.grounded && !this.isDucking) {
                    this.dy = -this.jumpPower;
                    this.grounded = false;
                }
            },
            update() {
                this.y += this.dy;
                const groundY = 260;
                if (this.y + this.height < groundY) {
                    this.dy += this.gravity;
                    this.grounded = false;
                } else {
                    this.dy = 0;
                    this.grounded = true;
                    this.y = groundY - this.height;
                }
            }
        };

        // Obstacles
        const obstacles = [];
        class Obstacle {
            constructor() {
                this.x = canvas.width;
                this.type = Math.random() > 0.7 ? 'bird' : 'cactus'; 
                
                if(this.type === 'cactus') {
                    this.width = 30 + Math.random() * 20;
                    this.height = 40 + Math.random() * 30;
                    this.y = 260 - this.height;
                    this.color = '#22c55e';
                } else {
                    this.width = 45;
                    this.height = 25;
                    // Low bird (must duck) or High bird (stay ground)
                    this.y = Math.random() > 0.5 ? 260 - 80 : 260 - 35;
                    this.color = '#fbbf24';
                }
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.roundRect(this.x, this.y, this.width, this.height, 5);
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.x -= gameSpeed;
            }
        }

        function spawnObstacle() {
            // Adaptive difficulty
            const interval = Math.max(50, 120 - Math.floor(score / 5));
            if (frame % interval === 0) {
                if(Math.random() > 0.2) obstacles.push(new Obstacle());
            }
        }

        function handleInput(e) {
            if (isGameOver && (e.code === 'Space' || e.code === 'ArrowUp')) {
                resetGame();
                return;
            }
            if (!isPlaying && e.code === 'Space') {
                resetGame();
            }
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                dino.jump();
            }
            if (e.code === 'ArrowDown') {
                e.preventDefault();
                dino.isDucking = true;
            }
        }
        
        function handleInputUp(e) {
            if (e.code === 'ArrowDown') dino.isDucking = false;
        }

        document.addEventListener('keydown', handleInput);
        document.addEventListener('keyup', handleInputUp);
        
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            if(!isPlaying) resetGame();
            else dino.jump();
        });

        function resetGame() {
            obstacles.length = 0;
            score = 0;
            gameSpeed = 6;
            frame = 0;
            isGameOver = false;
            isPlaying = true;
            animate();
        }

        function animate() {
            if (!isPlaying) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Ground line
            ctx.strokeStyle = '#475569';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(0, 260);
            ctx.lineTo(canvas.width, 260);
            ctx.stroke();
            ctx.setLineDash([]);

            dino.update();
            dino.draw();

            spawnObstacle();

            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].update();
                obstacles[i].draw();

                // Collision detection
                let dinoHitX = dino.x + 5;
                let dinoHitW = dino.isDucking ? 55 : dino.width - 10;
                let dinoHitY = dino.isDucking ? dino.y + 24 : dino.y + 5;
                let dinoHitH = dino.isDucking ? 25 : dino.height - 10;

                if (dinoHitX < obstacles[i].x + obstacles[i].width &&
                    dinoHitX + dinoHitW > obstacles[i].x &&
                    dinoHitY < obstacles[i].y + obstacles[i].height &&
                    dinoHitY + dinoHitH > obstacles[i].y) {
                    
                    endGame();
                    return;
                }

                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    i--;
                    score++;
                    if(score % 10 === 0) gameSpeed += 0.2;
                }
            }

            // UI
            ctx.fillStyle = 'white';
            ctx.font = 'bold 18px Courier New';
            ctx.textAlign = 'left';
            ctx.fillText('SCORE: ' + score, 20, 35);
            ctx.textAlign = 'right';
            ctx.fillText('HI: ' + highScore, canvas.width - 20, 35);

            frame++;
            if(!isGameOver) requestAnimationFrame(animate);
        }

        function endGame() {
            isGameOver = true;
            isPlaying = false;
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('dino-high-score', highScore);
            }
            
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0,0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#f43f5e';
            ctx.font = 'bold 50px Courier New';
            ctx.textAlign = 'center';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#f43f5e';
            ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
            
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            ctx.font = '20px Courier New';
            ctx.fillText('SCORE: ' + score, canvas.width/2, canvas.height/2 + 30);
            ctx.fillText('PRESS SPACE TO RESTART', canvas.width/2, canvas.height/2 + 70);
        }

        // Initial Screen
        ctx.fillStyle = 'white';
        ctx.font = '24px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('PRESS SPACE TO START', canvas.width/2, 150);

    </script>
</body>
</html>
