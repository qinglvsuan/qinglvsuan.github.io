<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Neon Snake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: sans-serif; user-select: none; overflow: hidden; }
        #game-canvas { background-color: #1e293b; border: 2px solid #8b5cf6; box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); border-radius: 12px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen p-4">
    <h2 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-purple-500 mb-2 animate-pulse font-mono">NEON SNAKE</h2>
    <div class="flex gap-8 mb-4 font-mono text-sm">
        <div class="text-slate-400">SCORE: <span id="score-val" class="text-pink-400 font-bold text-lg">0</span></div>
        <div class="text-slate-400">BEST: <span id="high-score" class="text-purple-400 font-bold text-lg">0</span></div>
    </div>
    
    <div class="relative">
        <canvas id="game-canvas" width="400" height="400"></canvas>
        <div id="start-overlay" class="absolute inset-0 bg-black/60 flex flex-col items-center justify-center rounded-xl cursor-pointer transition-opacity duration-300">
            <p id="overlay-title" class="text-purple-300 text-xl font-bold mb-2">点击开始游戏</p>
            <p class="text-slate-400 text-sm">使用 WASD 或 方向键</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreVal = document.getElementById('score-val');
        const highScoreVal = document.getElementById('high-score');
        const startOverlay = document.getElementById('start-overlay');
        const overlayTitle = document.getElementById('overlay-title');

        let snake, food, dx, dy, score, gameTimeout;
        let isRunning = false;
        let speed = 150;
        let highScore = localStorage.getItem('snake-high-score') || 0;
        highScoreVal.innerText = highScore;

        const gridSize = 20; 
        const tileCount = canvas.width / gridSize; 

        const drawRect = (x, y, color, shadow, radius = 4) => {
            ctx.save();
            ctx.fillStyle = color;
            if (shadow) {
                ctx.shadowBlur = 15;
                ctx.shadowColor = shadow;
            }
            const px = x * gridSize + 1;
            const py = y * gridSize + 1;
            const size = gridSize - 2;
            
            ctx.beginPath();
            if (ctx.roundRect) {
                ctx.roundRect(px, py, size, size, radius);
            } else {
                ctx.rect(px, py, size, size);
            }
            ctx.fill();
            ctx.restore();
        };

        const init = () => {
            snake = [
                {x: 10, y: 10},
                {x: 9, y: 10},
                {x: 8, y: 10}
            ];
            dx = 1; dy = 0; 
            score = 0; 
            speed = 150;
            scoreVal.innerText = 0;
            placeFood(); 
            isRunning = false; 
            startOverlay.style.display = 'flex';
            startOverlay.style.opacity = '1';
            if(gameTimeout) clearTimeout(gameTimeout);
            draw();
        };

        const placeFood = () => {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            if(snake.some(part => part.x === food.x && part.y === food.y)) placeFood();
        };

        const gameLoop = () => {
            if(!isRunning) return;
            
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            if(head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            if(snake.some(part => part.x === head.x && part.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            if(head.x === food.x && head.y === food.y) {
                score += 10;
                scoreVal.innerText = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreVal.innerText = highScore;
                    localStorage.setItem('snake-high-score', highScore);
                }
                speed = Math.max(60, 150 - Math.floor(score / 50) * 10);
                placeFood();
            } else {
                snake.pop();
            }
            
            draw();
            gameTimeout = setTimeout(gameLoop, speed);
        };

        const draw = () => {
            ctx.fillStyle = '#1e293b'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(255,255,255,0.02)';
            ctx.lineWidth = 1;
            for(let i=0; i<=tileCount; i++) {
                ctx.beginPath(); ctx.moveTo(i*gridSize, 0); ctx.lineTo(i*gridSize, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i*gridSize); ctx.lineTo(canvas.width, i*gridSize); ctx.stroke();
            }

            drawRect(food.x, food.y, '#fb7185', '#ec4899', 10); 
            
            snake.forEach((part, i) => {
                const ratio = i / snake.length;
                const color = i === 0 ? '#d946ef' : `rgba(168, 85, 247, ${1 - ratio * 0.6})`;
                drawRect(part.x, part.y, color, i === 0 ? '#d946ef' : null, i === 0 ? 6 : 4);
            });
        };

        const gameOver = () => {
            isRunning = false;
            overlayTitle.innerText = "游戏结束";
            overlayTitle.classList.add('text-red-400');
            startOverlay.style.display = 'flex';
            setTimeout(() => { startOverlay.style.opacity = '1'; }, 10);
        };

        const start = () => {
            if(isRunning) return;
            overlayTitle.classList.remove('text-red-400');
            overlayTitle.innerText = "点击开始游戏";
            isRunning = true;
            startOverlay.style.opacity = '0';
            setTimeout(() => { startOverlay.style.display = 'none'; }, 300);
            gameLoop();
        };

        document.addEventListener('keydown', e => {
            const keys = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d',' '];
            if(!isRunning && keys.includes(e.key)) {
                if(startOverlay.style.display !== 'none') {
                    if (overlayTitle.innerText === "游戏结束") init();
                    start();
                }
            }
            
            const key = e.key.toLowerCase();
            if ((key === 'arrowup' || key === 'w') && dy === 0) { dx = 0; dy = -1; e.preventDefault(); }
            if ((key === 'arrowdown' || key === 's') && dy === 0) { dx = 0; dy = 1; e.preventDefault(); }
            if ((key === 'arrowleft' || key === 'a') && dx === 0) { dx = -1; dy = 0; e.preventDefault(); }
            if ((key === 'arrowright' || key === 'd') && dx === 0) { dx = 1; dy = 0; e.preventDefault(); }
        });

        startOverlay.addEventListener('click', () => {
            if (overlayTitle.innerText === "游戏结束") init();
            start();
        });

        let touchStartX = 0;
        let touchStartY = 0;
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            if (isRunning) e.preventDefault();
        }, {passive: false});

        canvas.addEventListener('touchmove', e => {
            if(!isRunning) return;
            const dx_touch = e.touches[0].clientX - touchStartX;
            const dy_touch = e.touches[0].clientY - touchStartY;
            
            if (Math.abs(dx_touch) > Math.abs(dy_touch)) {
                if (Math.abs(dx_touch) > 30) {
                    if (dx_touch > 0 && dx === 0) { dx = 1; dy = 0; }
                    else if (dx_touch < 0 && dx === 0) { dx = -1; dy = 0; }
                }
            } else {
                if (Math.abs(dy_touch) > 30) {
                    if (dy_touch > 0 && dy === 0) { dx = 0; dy = 1; }
                    else if (dy_touch < 0 && dy === 0) { dx = 0; dy = -1; }
                }
            }
            e.preventDefault();
        }, {passive: false});

        init();
    </script>
</body>
</html>
