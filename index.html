    <style>
        /* --- CSS 变量定义 --- */
        :root {
            --primary: #ec4899;
            --primary-hover: #db2777;
            --glass-bg: rgba(25, 15, 35, 0.65);
            --text-grad: linear-gradient(to right, #ec4899, #d946ef, #8b5cf6);
            --glow-color: rgba(236, 72, 153, 0.5);
            --border-color: rgba(255, 255, 255, 0.08);
            
            /* 动态卡片变量 */
            --card-hover-bg: rgba(236, 72, 153, 0.1);
            --card-hover-border: rgba(236, 72, 153, 0.3);
            --text-highlight: #f9a8d4;
        }

        /* --- 全局设置 --- */
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: #0f172a;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        /* --- 动态背景层 --- */
        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            background-image: url('images/2.png'); 
            transition: all 0.6s ease-in-out;
        }
        #bg-layer.is-blurred { filter: blur(15px); transform: scale(1.1); }

        /* --- 遮罩层 --- */
        #overlay-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at center, rgba(15, 23, 42, 0.2) 0%, rgba(10, 5, 20, 0.8) 100%);
            pointer-events: none;
        }

        /* --- 玻璃卡片 --- */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7);
            transition: background 0.5s ease;
        }

        /* --- 动态流光字 --- */
        .text-dynamic-gradient {
            background: var(--text-grad);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% auto; animation: gradientMove 5s ease infinite;
        }
        @keyframes gradientMove { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        .animate-fade-up { opacity: 0; transform: translateY(40px); animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        /* --- 设置面板 --- */
        .settings-panel {
            bottom: 6rem; right: 1.5rem;
            transform: translateY(150%); visibility: hidden; opacity: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 110;
        }
        .settings-panel.active { transform: translateY(0); visibility: visible; opacity: 1; }
        
        /* --- 动态控件颜色 --- */
        .toggle-checkbox:checked { right: 0; border-color: var(--primary); }
        .toggle-checkbox:checked + .toggle-label { background-color: var(--primary); }
        
        /* --- 游戏大厅 --- */
        #game-center-modal { display: none; opacity: 0; transition: opacity 0.3s ease; z-index: 120; }
        #game-center-modal.open { display: flex; opacity: 1; }
        
        .game-card-hover:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.3);
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* --- 按钮样式 --- */
        .btn-primary { background-color: var(--primary); color: white; transition: all 0.2s; }
        .btn-primary:hover { filter: brightness(1.1); }
        
        .icon-btn {
            color: #e2e8f0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s;
        }
        .icon-btn:hover {
            background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 15px var(--glow-color);
        }

        /* --- 动态卡片悬停 (AI Card) --- */
        .card-theme-active { transition: all 0.3s ease; }
        .card-theme-active:hover { background-color: var(--card-hover-bg); border-color: var(--card-hover-border); }
        .card-theme-active:hover .theme-text { color: var(--text-highlight); }
    </style>
</head>

            const gameContainer = document.getElementById('game-container');
            const gameFrame = document.getElementById('game-frame');
            const backToListBtn = document.getElementById('back-to-list');
            const blurToggle = document.getElementById('blur-toggle');
            const bgUrlInput = document.getElementById('bg-url-input');
            const changeBgBtn = document.getElementById('change-bg-btn');
            const resetBtn = document.getElementById('reset-btn');
            
            const root = document.documentElement;
            const defaultBgUrl = 'images/2.png';

            const themes = {
                pink: { primary: '#ec4899', hover: '#db2777', glass: 'rgba(25, 15, 35, 0.65)', grad: 'linear-gradient(to right, #ec4899, #d946ef, #8b5cf6)', glow: 'rgba(236, 72, 153, 0.5)', cardHoverBg: 'rgba(236, 72, 153, 0.1)', cardHoverBorder: 'rgba(236, 72, 153, 0.3)', textHighlight: '#f9a8d4' },
                blue: { primary: '#22d3ee', hover: '#0891b2', glass: 'rgba(15, 25, 35, 0.65)', grad: 'linear-gradient(to right, #22d3ee, #3b82f6, #6366f1)', glow: 'rgba(34, 211, 238, 0.5)', cardHoverBg: 'rgba(34, 211, 238, 0.1)', cardHoverBorder: 'rgba(34, 211, 238, 0.3)', textHighlight: '#a5f3fc' },
                green: { primary: '#34d399', hover: '#059669', glass: 'rgba(15, 30, 20, 0.65)', grad: 'linear-gradient(to right, #34d399, #10b981, #059669)', glow: 'rgba(52, 211, 153, 0.5)', cardHoverBg: 'rgba(52, 211, 153, 0.1)', cardHoverBorder: 'rgba(52, 211, 153, 0.3)', textHighlight: '#6ee7b7' },
                orange: { primary: '#fb923c', hover: '#ea580c', glass: 'rgba(35, 20, 15, 0.65)', grad: 'linear-gradient(to right, #fb923c, #f97316, #dc2626)', glow: 'rgba(251, 146, 60, 0.5)', cardHoverBg: 'rgba(251, 146, 60, 0.1)', cardHoverBorder: 'rgba(251, 146, 60, 0.3)', textHighlight: '#fdba74' }
            };

            window.setTheme = (themeName) => {
                const t = themes[themeName]; if(!t) return;
                root.style.setProperty('--primary', t.primary); root.style.setProperty('--primary-hover', t.hover); root.style.setProperty('--glass-bg', t.glass); root.style.setProperty('--text-grad', t.grad); root.style.setProperty('--glow-color', t.glow); root.style.setProperty('--card-hover-bg', t.cardHoverBg); root.style.setProperty('--card-hover-border', t.cardHoverBorder); root.style.setProperty('--text-highlight', t.textHighlight);
                localStorage.setItem('user-theme', themeName);
            };

            const setBackground = (url) => { if (!url) return; const img = new Image(); img.src = url; img.onload = () => { bgLayer.style.backgroundImage = `url('${url}')`; localStorage.setItem('user-background-image', url); }; };
            const toggleBlur = (isBlurred) => { isBlurred ? bgLayer.classList.add('is-blurred') : bgLayer.classList.remove('is-blurred'); localStorage.setItem('user-bg-blur', isBlurred); };

            setBackground(localStorage.getItem('user-background-image') || defaultBgUrl);
            const savedBlur = localStorage.getItem('user-bg-blur') === 'true'; if(blurToggle) blurToggle.checked = savedBlur; toggleBlur(savedBlur);
            window.setTheme(localStorage.getItem('user-theme') || 'pink');

            settingsBtn.addEventListener('click', (e) => { e.stopPropagation(); settingsPanel.classList.toggle('active'); settingsBtn.classList.toggle('rotate-90'); });
            changeBgBtn.addEventListener('click', () => { const val = bgUrlInput.value.trim(); if(val) { setBackground(val); bgUrlInput.value=''; } });
            blurToggle.addEventListener('change', (e) => toggleBlur(e.target.checked));
            resetBtn.addEventListener('click', () => { if(confirm('恢复默认?')) { localStorage.clear(); setBackground(defaultBgUrl); toggleBlur(false); window.setTheme('pink'); location.reload(); } });
            document.addEventListener('click', (e) => { if(settingsPanel.classList.contains('active') && !settingsPanel.contains(e.target) && !settingsBtn.contains(e.target)) { settingsPanel.classList.remove('active'); settingsBtn.classList.remove('rotate-90'); } });
            gameCenterBtn.addEventListener('click', () => { gameCenterModal.classList.add('open'); gameListView.classList.remove('hidden'); gameContainer.classList.add('hidden'); settingsPanel.classList.remove('active'); settingsBtn.classList.remove('rotate-90'); });
            closeGameCenterBtn.addEventListener('click', () => { gameCenterModal.classList.remove('open'); setTimeout(() => { gameFrame.src = ''; }, 300); });
            backToListBtn.addEventListener('click', () => { gameContainer.classList.add('hidden'); gameListView.classList.remove('hidden'); gameFrame.src = ''; });
            window.loadGame = (gameUrl) => { gameListView.classList.add('hidden'); gameContainer.classList.remove('hidden'); gameFrame.src = gameUrl; }
        });
    </script>
</body>
</html>
